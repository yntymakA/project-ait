services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-marketplace}
      MYSQL_USER: ${DB_USER:-marketplace_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_USER: ${DB_USER:-marketplace_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-marketplace}
      DATABASE_URL: mysql+pymysql://${DB_USER:-marketplace_user}:${DB_PASSWORD:-password}@db:3306/${DB_NAME:-marketplace}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-tashmat@gmail.com}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-dev}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-marketplace-ait}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-marketplace-ait.firebasestorage.app}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: ./Web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-AIzaSyDkcm4AW_aW_TPUaKjgPi1LcQgsNX6voJc}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-marketplace-ait.firebaseapp.com}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-marketplace-ait}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-marketplace-ait.firebasestorage.app}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-653789648946}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:653789648946:web:389459a252877565ef442b}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  db_data:
