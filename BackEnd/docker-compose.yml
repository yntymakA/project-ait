services:
  db:
    image: mysql:8.0
    container_name: marketplace_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-marketplace}
      MYSQL_USER: ${DB_USER:-marketplace_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - custom_mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: marketplace_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://${DB_USER:-marketplace_user}:${DB_PASSWORD:-password}@db:3306/${DB_NAME:-marketplace}
    volumes:
      - .:/app
    depends_on:
      - db

  web:
    image: node:20-alpine
    container_name: marketplace_web
    restart: always
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../Web:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  custom_mysql_data:
